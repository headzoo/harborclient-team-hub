name: Release

# Bumps `package.json`, renames `## Unreleased` in CHANGELOG.md, commits + tags +
# pushes back to main, then creates a GitHub release. Trigger manually with a
# semver bump input.

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'semver bump'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Bump version
        run: |
          set -euo pipefail
          VERSION=$(pnpm version "${{ inputs.release_type }}" --no-git-tag-version | tail -n1 | sed 's/^v//')
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Bumped to $VERSION"

      - name: Update CHANGELOG.md for release
        if: env.VERSION != ''
        run: |
          set -euo pipefail
          python3 - "$VERSION" "$(date -u +%Y-%m-%d)" <<'PY'
          import re
          import sys
          import pathlib

          version, date_iso = sys.argv[1], sys.argv[2]
          path = pathlib.Path("CHANGELOG.md")
          if not path.exists():
              print("::warning::CHANGELOG.md not found; skipping changelog rename.")
              sys.exit(0)

          text = path.read_text()
          match = re.search(r"^## Unreleased\s*\n(.*?)(?=^## |\Z)", text, flags=re.S | re.M)
          if not match or not match.group(1).strip():
              print("::warning::No Unreleased content; skipping changelog rename.")
              sys.exit(0)

          body = match.group(1).strip("\n")
          replacement = f"## Unreleased\n\n## {version} - {date_iso}\n\n{body}\n"
          new_text = re.sub(
              r"^## Unreleased\s*\n.*?(?=^## |\Z)",
              replacement + "\n",
              text,
              count=1,
              flags=re.S | re.M,
          )
          path.write_text(new_text)
          PY

      - name: Commit, tag, and push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          git commit -m "chore(changelog): release v${VERSION} [skip ci]"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin HEAD:main --follow-tags

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "v${VERSION}" --generate-notes --title "v${VERSION}"
